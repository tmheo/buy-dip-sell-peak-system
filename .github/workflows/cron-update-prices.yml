name: Daily Update

on:
  schedule:
    # KST 09:30 = UTC 00:30
    - cron: "30 0 * * *"
  workflow_dispatch: # 수동 실행 지원
    inputs:
      account_id:
        description: "특정 계좌만 마감 처리 (비우면 전체). 최초 catch-up 시 계좌 지정용"
        required: false
        default: ""

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Call update-prices API
        # 특정 계좌만 마감 처리할 때는 가격 업데이트를 건너뛴다
        if: ${{ github.event.inputs.account_id == '' }}
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://buy-dip-sell-peak-system.vercel.app/api/cron/update-prices")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ne 200 ]; then
            echo "::error::API call failed with status $http_code"
            exit 1
          fi

      - name: Call process-daily-orders API
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ACCOUNT_ID: ${{ github.event.inputs.account_id }}
        run: |
          url="https://buy-dip-sell-peak-system.vercel.app/api/cron/process-daily-orders"
          if [ -n "$ACCOUNT_ID" ]; then
            url="${url}?accountId=${ACCOUNT_ID}"
          fi

          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "$url")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ne 200 ]; then
            echo "::error::API call failed with status $http_code"
            exit 1
          fi
